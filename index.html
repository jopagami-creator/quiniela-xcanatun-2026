<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiniela Oficial La Reforma</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#07163a;
    color:white;
    padding:20px;
}

.container{
    max-width:1800px;
    margin:auto;
}

header{
    text-align:center;
    margin-bottom:40px;
}

.logo{
    width:330px;
    max-width:90%;
    background:white;
    border-radius:20px;
    padding:15px;
    margin-bottom:20px;
}

header h1{
    font-size:3rem;
    margin-bottom:10px;
}

header p{
    color:#d8d8d8;
    font-size:1.1rem;
}

.user-box{
    background:#0f2459;
    padding:20px;
    border-radius:15px;
    margin-bottom:30px;
    display:flex;
    gap:15px;
    align-items:center;
    justify-content:center;
    flex-wrap:wrap;
}

.user-box input{
    padding:12px;
    border:none;
    border-radius:10px;
    width:280px;
    font-size:16px;
}

.save-btn{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#00b4ff;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.save-btn:hover{
    opacity:.9;
}

.groups-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
    gap:20px;
}

.group-card{
    background:#0f2459;
    border-radius:18px;
    padding:20px;
    border:2px solid #1f4bbd;
}

.group-title{
    text-align:center;
    font-size:1.5rem;
    margin-bottom:20px;
    font-weight:bold;
}

.match{
    background:#16357d;
    border-radius:12px;
    padding:12px;
    margin-bottom:12px;
}

.match-title{
    text-align:center;
    margin-bottom:10px;
    color:#dce8ff;
    font-weight:bold;
}

.team-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:8px 0;
}

.score{
    width:55px;
    height:38px;
    border:none;
    border-radius:8px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
}

.deadline{
    margin-top:20px;
    background:#16357d;
    padding:15px;
    border-radius:12px;
    display:inline-block;
    font-weight:bold;
    color:#ffd166;
}

footer{
    text-align:center;
    margin-top:60px;
    color:#bdbdbd;
}

@media(max-width:900px){

    header h1{
        font-size:2rem;
    }

}

</style>

</head>

<body>

<div class="container">

<header>

<img src="logo.png" class="logo" alt="La Reforma">

<h1>QUINIELA OFICIAL</h1>

<h1>LA REFORMA</h1>

<p>
Mundial 2026
</p>

<div class="deadline">
⏳ Fecha límite para guardar o modificar quinielas:
21 de mayo de 2026 • 6:10 PM (Hora Mérida)
</div>

</header>

<div class="user-box">

<input type="text" id="userName" placeholder="Nombre completo">

<button class="save-btn" onclick="savePredictions()">
GUARDAR QUINIELA
</button>

</div>

<div class="groups-grid" id="groupsContainer"></div>

<footer>
Quiniela Oficial La Reforma
</footer>

</div>

<script type="module">

// =======================================
// FIREBASE
// =======================================

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";


// =======================================
// FIREBASE CONFIG
// =======================================

const firebaseConfig = {

  apiKey: "AIzaSyCYW14XmuBw6JPvrz6rEJ071pD4pWxPnAI",

  authDomain: "quiniela-xcanatun.firebaseapp.com",

  projectId: "quiniela-xcanatun",

  storageBucket: "quiniela-xcanatun.firebasestorage.app",

  messagingSenderId: "824126319061",

  appId: "1:824126319061:web:87cf3fb2addf5751e6355c",

  measurementId: "G-F1ZS7CWF4R"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


// =======================================
// FECHA LÍMITE
// =======================================

const fechaLimite = new Date("2026-05-21T18:10:00-06:00");

function revisarFechaLimite(){

    const ahora = new Date();

    const boton = document.querySelector(".save-btn");

    if(ahora >= fechaLimite){

        boton.disabled = true;

        boton.innerText = "QUINIELA CERRADA";

        boton.style.background = "gray";

        boton.style.cursor = "not-allowed";

    }

}

revisarFechaLimite();


// =======================================
// GRUPOS
// =======================================

const groups = {

"Grupo A": ["México","Sudáfrica","Corea","Chequia"],

"Grupo B": ["Canadá","Bosnia","Qatar","Suiza"],

"Grupo C": ["Brasil","Marruecos","Haití","Escocia"],

"Grupo D": ["EE.UU.","Paraguay","Australia","Turquía"],

"Grupo E": ["Alemania","Curazao","Costa de Marfil","Ecuador"],

"Grupo F": ["Países Bajos","Japón","Suecia","Túnez"],

"Grupo G": ["Bélgica","Egipto","Irán","Nueva Zelanda"],

"Grupo H": ["España","Cabo Verde","Arabia Saudita","Uruguay"],

"Grupo I": ["Francia","Senegal","Irak","Noruega"],

"Grupo J": ["Argentina","Argelia","Austria","Jordania"],

"Grupo K": ["Portugal","RD Congo","Uzbekistán","Colombia"],

"Grupo L": ["Inglaterra","Croacia","Ghana","Panamá"]

};

const groupsContainer = document.getElementById("groupsContainer");

Object.entries(groups).forEach(([groupName, teams]) => {

    const card = document.createElement("div");

    card.className = "group-card";

    let matchesHTML = "";

    for(let i=0;i<teams.length;i++){

        for(let j=i+1;j<teams.length;j++){

            matchesHTML += `

            <div class="match">

                <div class="match-title">
                    ${teams[i]} vs ${teams[j]}
                </div>

                <div class="team-row">

                    <span>${teams[i]}</span>

                    <input class="score" type="number" min="0" value="0">

                </div>

                <div class="team-row">

                    <span>${teams[j]}</span>

                    <input class="score" type="number" min="0" value="0">

                </div>

            </div>

            `;

        }

    }

    card.innerHTML = `

        <div class="group-title">
            ${groupName}
        </div>

        ${matchesHTML}

    `;

    groupsContainer.appendChild(card);

});


// =======================================
// GUARDAR QUINIELA
// =======================================

window.savePredictions = async function(){

    if(new Date() >= fechaLimite){

        alert("La quiniela cerró el 21 de mayo de 2026 a las 6:10 PM (Hora Mérida).");

        return;

    }

    const userName = document.getElementById("userName").value.trim();

    if(userName === ""){

        alert("Ingresa tu nombre");

        return;

    }

    const predictions = [];

    document.querySelectorAll(".match").forEach(match => {

        const rows = match.querySelectorAll(".team-row");

        const team1 = rows[0].querySelector("span").innerText;

        const team2 = rows[1].querySelector("span").innerText;

        const score1 = rows[0].querySelector("input").value;

        const score2 = rows[1].querySelector("input").value;

        predictions.push({

            partido: `${team1} vs ${team2}`,

            local: team1,

            visitante: team2,

            marcadorLocal: Number(score1),

            marcadorVisitante: Number(score2)

        });

    });

    try{

        await addDoc(collection(db, "quinielas"), {

            nombre: userName,

            predicciones: predictions,

            puntos: 0,

            fecha: new Date()

        });

        alert("✅ Quiniela guardada correctamente");

    }catch(error){

        console.error(error);

        alert("❌ Error al guardar");

    }

}

</script>

</body>
</html>
