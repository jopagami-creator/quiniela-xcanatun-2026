<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Quiniela La Reforma</title>

<style>
body{background:#07163a;color:white;font-family:Arial;padding:20px}
.container{max-width:1600px;margin:auto}
.logo{width:260px;background:white;border-radius:18px;padding:15px}
header{text-align:center;margin-bottom:30px}
.card{background:#0f2459;border:2px solid #1f4bbd;border-radius:18px;padding:20px;margin-bottom:25px}
.match{background:#16357d;border-radius:12px;padding:15px;margin-bottom:12px}
button{background:#00b4ff;color:white;border:none;padding:13px 20px;border-radius:10px;font-weight:bold;cursor:pointer;margin:8px}
input{width:65px;height:38px;border:none;border-radius:8px;text-align:center;font-size:18px;font-weight:bold}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid rgba(255,255,255,.2);padding:10px;text-align:center}
th{background:#16357d}
.leader{background:#00b4ff!important;font-weight:bold}
</style>
</head>

<body>

<div class="container">

<header>
<img src="logo.png" class="logo">
<h1>ADMIN QUINIELA LA REFORMA</h1>
</header>

<div class="card">
<h2>Acciones</h2>
<button onclick="cargarDatos()">Actualizar datos</button>
<button onclick="guardarResultados()">Guardar resultados reales</button>
<button onclick="calcularPuntos()">Calcular puntos</button>
<p id="status"></p>
</div>

<div class="card">
<h2>Tabla de líderes</h2>
<table>
<thead>
<tr>
<th>Posición</th>
<th>Nombre</th>
<th>Teléfono</th>
<th>Puntos</th>
<th>Predicciones</th>
</tr>
</thead>
<tbody id="leaderboard"></tbody>
</table>
</div>

<div class="card">
<h2>Participantes</h2>
<div id="participantes"></div>
</div>

<div class="card">
<h2>Resultados reales</h2>
<div id="resultados"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
setDoc,
getDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCYW14XmuBw6JPvrz6rEJ071pD4pWxPnAI",
authDomain: "quiniela-xcanatun.firebaseapp.com",
projectId: "quiniela-xcanatun",
storageBucket: "quiniela-xcanatun.firebasestorage.app",
messagingSenderId: "824126319061",
appId: "1:824126319061:web:87cf3fb2addf5751e6355c",
measurementId: "G-F1ZS7CWF4R"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let quinielas = [];
let partidosBase = [];
let resultadosGuardados = [];

function status(texto){
document.getElementById("status").innerText = texto;
}

window.cargarDatos = async function(){

status("Cargando...");

quinielas = [];
partidosBase = [];

const snap = await getDocs(collection(db,"quinielas"));

snap.forEach(docSnap=>{
quinielas.push({
id: docSnap.id,
...docSnap.data()
});
});

crearListaDePartidos();

await cargarResultadosGuardados();

mostrarParticipantes();
mostrarLeaderboard();
mostrarResultados();

status("Datos actualizados.");
};

function crearListaDePartidos(){

const mapa = new Map();

quinielas.forEach(q=>{
if(!q.predicciones) return;

q.predicciones.forEach(p=>{
if(!mapa.has(p.partido)){
mapa.set(p.partido,{
partido:p.partido,
local:p.local,
visitante:p.visitante
});
}
});
});

partidosBase = Array.from(mapa.values());

}

async function cargarResultadosGuardados(){

const ref = doc(db,"resultados","fase_grupos");
const snap = await getDoc(ref);

if(snap.exists()){
resultadosGuardados = snap.data().resultados || [];
}else{
resultadosGuardados = [];
}

}

function mostrarParticipantes(){

const div = document.getElementById("participantes");
div.innerHTML = "";

if(quinielas.length === 0){
div.innerHTML = "<p>No hay participantes.</p>";
return;
}

quinielas.forEach(q=>{
div.innerHTML += `
<div class="match">
<strong>${q.nombre || "Sin nombre"}</strong><br>
Teléfono: ${q.telefono || "-"}<br>
Puntos: ${q.puntos || 0}<br>
Predicciones: ${q.predicciones ? q.predicciones.length : 0}
</div>
`;
});

}

function mostrarLeaderboard(){

const tbody = document.getElementById("leaderboard");
tbody.innerHTML = "";

const ordenados = [...quinielas].sort((a,b)=>(b.puntos || 0) - (a.puntos || 0));

ordenados.forEach((q,index)=>{
tbody.innerHTML += `
<tr class="${index === 0 ? "leader" : ""}">
<td>${index + 1}</td>
<td>${q.nombre || "-"}</td>
<td>${q.telefono || "-"}</td>
<td>${q.puntos || 0}</td>
<td>${q.predicciones ? q.predicciones.length : 0}</td>
</tr>
`;
});

}

function mostrarResultados(){

const div = document.getElementById("resultados");
div.innerHTML = "";

if(partidosBase.length === 0){
div.innerHTML = "<p>No hay partidos todavía.</p>";
return;
}

partidosBase.forEach((p,index)=>{

const previo = resultadosGuardados.find(r=>r.partido === p.partido);

const local = previo && previo.marcadorLocal !== undefined ? previo.marcadorLocal : "";
const visitante = previo && previo.marcadorVisitante !== undefined ? previo.marcadorVisitante : "";

div.innerHTML += `
<div class="match">
<strong>${p.partido}</strong><br><br>

${p.local}
<input type="number" min="0" id="local-${index}" value="${local}">

-

<input type="number" min="0" id="visitante-${index}" value="${visitante}">
${p.visitante}

</div>
`;

});

}

window.guardarResultados = async function(){

const resultadosFinales = [...resultadosGuardados];

partidosBase.forEach((p,index)=>{

const localInput = document.getElementById(`local-${index}`).value;
const visitanteInput = document.getElementById(`visitante-${index}`).value;

const existeIndex = resultadosFinales.findIndex(r=>r.partido === p.partido);

if(localInput !== "" && visitanteInput !== ""){

const resultadoNuevo = {
partido:p.partido,
local:p.local,
visitante:p.visitante,
marcadorLocal:Number(localInput),
marcadorVisitante:Number(visitanteInput)
};

if(existeIndex >= 0){
resultadosFinales[existeIndex] = resultadoNuevo;
}else{
resultadosFinales.push(resultadoNuevo);
}

}

});

await setDoc(doc(db,"resultados","fase_grupos"),{
resultados:resultadosFinales,
actualizado:new Date()
});

resultadosGuardados = resultadosFinales;

alert("✅ Resultados guardados sin borrar marcadores anteriores.");

await cargarDatos();

};

function ganador(a,b){
if(a>b) return "local";
if(b>a) return "visitante";
return "empate";
}

function puntos(pred, real){

if(!real) return 0;

const pL = Number(pred.marcadorLocal);
const pV = Number(pred.marcadorVisitante);
const rL = Number(real.marcadorLocal);
const rV = Number(real.marcadorVisitante);

if(pL === rL && pV === rV) return 3;

if(ganador(pL,pV) === ganador(rL,rV)) return 1;

return 0;

}

window.calcularPuntos = async function(){

await cargarResultadosGuardados();

if(resultadosGuardados.length === 0){
alert("Primero guarda resultados reales.");
return;
}

for(const q of quinielas){

let total = 0;

if(q.predicciones){
q.predicciones.forEach(pred=>{
const real = resultadosGuardados.find(r=>r.partido === pred.partido);
total += puntos(pred,real);
});
}

await updateDoc(doc(db,"quinielas",q.id),{
puntos:total,
puntosActualizados:new Date()
});

}

alert("✅ Puntos actualizados.");

await cargarDatos();

};

cargarDatos();

</script>

</body>
</html>
