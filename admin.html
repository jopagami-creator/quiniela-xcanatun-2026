<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Quiniela La Reforma</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background:#07163a;
  color:white;
  padding:20px;
}

.container{
  max-width:1600px;
  margin:auto;
}

header{
  text-align:center;
  margin-bottom:30px;
}

.logo{
  width:280px;
  max-width:90%;
  background:white;
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
}

h1{
  font-size:2.5rem;
}

.card{
  background:#0f2459;
  border:2px solid #1f4bbd;
  border-radius:18px;
  padding:20px;
  margin-bottom:25px;
}

.card h2{
  margin-bottom:20px;
  color:#00d0ff;
}

.match{
  background:#16357d;
  border-radius:12px;
  padding:15px;
  margin-bottom:12px;
}

.match-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

input{
  width:60px;
  height:38px;
  border:none;
  border-radius:8px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
}

button{
  background:#00b4ff;
  color:white;
  border:none;
  padding:13px 20px;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  margin-top:15px;
}

button:hover{
  opacity:.9;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th, td{
  border:1px solid rgba(255,255,255,0.15);
  padding:10px;
  text-align:center;
}

th{
  background:#16357d;
}

tr:nth-child(even){
  background:#132b67;
}

.leader{
  background:#00b4ff !important;
  color:white;
  font-weight:bold;
}

.small{
  color:#cfcfcf;
  font-size:14px;
}

@media(max-width:800px){
  h1{
    font-size:1.8rem;
  }
}
</style>
</head>

<body>

<div class="container">

<header>
  <img src="logo.png" class="logo" alt="La Reforma">
  <h1>ADMIN QUINIELA LA REFORMA</h1>
  <p class="small">Panel para resultados, puntos y tabla de líderes</p>
</header>

<div class="card">
  <h2>Tabla de líderes</h2>
  <button onclick="calcularPuntos()">Actualizar puntos</button>
  <table>
    <thead>
      <tr>
        <th>Posición</th>
        <th>Participante</th>
        <th>Puntos</th>
        <th>Predicciones</th>
      </tr>
    </thead>
    <tbody id="leaderboard"></tbody>
  </table>
</div>

<div class="card">
  <h2>Participantes</h2>
  <div id="participantes"></div>
</div>

<div class="card">
  <h2>Resultados reales</h2>
  <p class="small">
    Agrega aquí los marcadores reales cuando se juegue cada partido.
  </p>
  <div id="resultados"></div>
  <button onclick="guardarResultados()">Guardar resultados reales</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  doc,
  setDoc,
  getDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCYW14XmuBw6JPvrz6rEJ071pD4pWxPnAI",
  authDomain: "quiniela-xcanatun.firebaseapp.com",
  projectId: "quiniela-xcanatun",
  storageBucket: "quiniela-xcanatun.firebasestorage.app",
  messagingSenderId: "824126319061",
  appId: "1:824126319061:web:87cf3fb2addf5751e6355c",
  measurementId: "G-F1ZS7CWF4R"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let quinielas = [];
let partidosBase = [];
let resultadosGuardados = [];

async function cargarDatos(){

  quinielas = [];

  const querySnapshot = await getDocs(collection(db, "quinielas"));

  querySnapshot.forEach((docSnap) => {
    quinielas.push({
      id: docSnap.id,
      ...docSnap.data()
    });
  });

  if(quinielas.length > 0){
    partidosBase = quinielas[0].predicciones;
  }

  await cargarResultados();

  mostrarParticipantes();
  mostrarLeaderboard();
  crearResultados();

}

async function cargarResultados(){

  const ref = doc(db, "resultados", "fase_grupos");
  const snap = await getDoc(ref);

  if(snap.exists()){
    resultadosGuardados = snap.data().resultados || [];
  }else{
    resultadosGuardados = [];
  }

}

function mostrarParticipantes(){

  const contenedor = document.getElementById("participantes");
  contenedor.innerHTML = "";

  if(quinielas.length === 0){
    contenedor.innerHTML = "<p>No hay participantes todavía.</p>";
    return;
  }

  quinielas.forEach(q => {

    contenedor.innerHTML += `
      <div class="match">
        <strong>${q.nombre}</strong><br>
        Puntos: ${q.puntos || 0}<br>
        Predicciones: ${q.predicciones ? q.predicciones.length : 0}
      </div>
    `;

  });

}

function mostrarLeaderboard(){

  const tbody = document.getElementById("leaderboard");
  tbody.innerHTML = "";

  const ordenados = [...quinielas].sort((a,b) => {
    return (b.puntos || 0) - (a.puntos || 0);
  });

  ordenados.forEach((q,index) => {

    tbody.innerHTML += `
      <tr class="${index === 0 ? 'leader' : ''}">
        <td>${index + 1}</td>
        <td>${q.nombre}</td>
        <td>${q.puntos || 0}</td>
        <td>${q.predicciones ? q.predicciones.length : 0}</td>
      </tr>
    `;

  });

}

function crearResultados(){

  const contenedor = document.getElementById("resultados");
  contenedor.innerHTML = "";

  if(partidosBase.length === 0){
    contenedor.innerHTML = "<p>No hay partidos todavía.</p>";
    return;
  }

  partidosBase.forEach((p,index) => {

    const resultadoPrevio = resultadosGuardados.find(r => r.partido === p.partido);

    const localValue = resultadoPrevio ? resultadoPrevio.marcadorLocal : "";
    const visitanteValue = resultadoPrevio ? resultadoPrevio.marcadorVisitante : "";

    contenedor.innerHTML += `
      <div class="match">
        <strong>${p.partido}</strong><br><br>

        <div class="match-row">
          <span>${p.local}</span>
          <input type="number" min="0" id="local-${index}" value="${localValue}">
          <span>-</span>
          <input type="number" min="0" id="visitante-${index}" value="${visitanteValue}">
          <span>${p.visitante}</span>
        </div>
      </div>
    `;

  });

}

window.guardarResultados = async function(){

  const resultados = [];

  partidosBase.forEach((p,index) => {

    const localInput = document.getElementById(`local-${index}`).value;
    const visitanteInput = document.getElementById(`visitante-${index}`).value;

    if(localInput !== "" && visitanteInput !== ""){

      resultados.push({
        partido: p.partido,
        local: p.local,
        visitante: p.visitante,
        marcadorLocal: Number(localInput),
        marcadorVisitante: Number(visitanteInput)
      });

    }

  });

  await setDoc(doc(db, "resultados", "fase_grupos"), {
    resultados: resultados,
    actualizado: new Date()
  });

  alert("✅ Resultados reales guardados");

  await cargarDatos();

}

function obtenerGanador(local, visitante){

  if(local > visitante) return "local";
  if(visitante > local) return "visitante";
  return "empate";

}

function puntosPorPartido(prediccion, resultado){

  if(!resultado) return 0;

  const predLocal = Number(prediccion.marcadorLocal);
  const predVisitante = Number(prediccion.marcadorVisitante);

  const realLocal = Number(resultado.marcadorLocal);
  const realVisitante = Number(resultado.marcadorVisitante);

  if(predLocal === realLocal && predVisitante === realVisitante){
    return 3;
  }

  const ganadorPred = obtenerGanador(predLocal, predVisitante);
  const ganadorReal = obtenerGanador(realLocal, realVisitante);

  if(ganadorPred === ganadorReal){
    return 1;
  }

  return 0;

}

window.calcularPuntos = async function(){

  if(resultadosGuardados.length === 0){
    alert("Primero guarda resultados reales.");
    return;
  }

  for(const q of quinielas){

    let total = 0;

    q.predicciones.forEach(pred => {

      const resultado = resultadosGuardados.find(r => r.partido === pred.partido);

      total += puntosPorPartido(pred, resultado);

    });

    await updateDoc(doc(db, "quinielas", q.id), {
      puntos: total
    });

  }

  alert("✅ Puntos actualizados");

  await cargarDatos();

}

cargarDatos();

</script>

</body>
</html>
